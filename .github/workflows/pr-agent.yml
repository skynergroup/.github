# Reusable PR-Agent workflow — Kimi Code direct via Anthropic protocol.
#
# Review/describe/improve settings are now in the global config repo:
# https://github.com/skynergroup/pr-agent-settings
#
# Usage in any skynergroup repo (pin SHA to latest commit):
#
#   name: PR Agent
#   on:
#     pull_request:
#       types: [opened, reopened, ready_for_review, synchronize]
#     issue_comment:
#       types: [created]
#   permissions:
#     issues: write
#     pull-requests: write
#     contents: read
#   jobs:
#     review:
#       uses: skynergroup/.github/.github/workflows/pr-agent.yml@<SHA>
#       secrets:
#         KIMI_API_KEY: *** secrets.KIMI_API_KEY }}

name: PR Agent - AI Code Review

on:
  workflow_call:
    secrets:
      KIMI_API_KEY:
        *** "Kimi Code API key (org-level secret)"
        required: true

jobs:
  pr_agent:
    if: >
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/'))
    runs-on: ubuntu-latest
    name: PR Agent
    steps:
      - uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}

          # ── Kimi Code direct (free via Kimi Code subscription) ──
          ANTHROPIC__KEY: *** secrets.KIMI_API_KEY }}
          ANTHROPIC_API_BASE: "https://api.kimi.com/coding"
          CONFIG__MODEL: "anthropic/kimi-for-coding"
          CONFIG__MODEL_TURBO: "anthropic/kimi-for-coding"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "262144"

          LITELLM__EXTRA_HEADERS: '{"User-Agent": "claude-code/0.1.0"}'
          LITELLM__DROP_PARAMS: "true"

          # All review/describe/improve/best_practices settings are in:
          # skynergroup/pr-agent-settings/.pr_agent.toml (org-wide global config)
